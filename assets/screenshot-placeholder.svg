<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="Neo4j Employee Agent chatbot preview">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="#f8fafc"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="270" height="720" fill="#0f172a"/>
  <rect x="269" y="0" width="1" height="720" fill="#e2e8f0"/>

  <!-- Sidebar Logo (SynapsesMed scaled version) -->
  <g transform="translate(35, 25) scale(0.25)">
    <!-- Neural Network Icon -->
    <circle cx="100" cy="100" r="55" fill="#3B82F6" fill-opacity="0.15"/>
    <circle cx="100" cy="100" r="42" stroke="#3B82F6" stroke-width="8"/>
    
    <!-- Synapse Connections -->
    <circle cx="55" cy="65" r="12" fill="#22D3EE"/>
    <circle cx="145" cy="65" r="12" fill="#22D3EE"/>
    <circle cx="55" cy="135" r="12" fill="#22D3EE"/>
    <circle cx="145" cy="135" r="12" fill="#22D3EE"/>
    
    <!-- Connecting Lines -->
    <line x1="70" y1="70" x2="130" y2="70" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <line x1="70" y1="130" x2="130" y2="130" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="60" x2="100" y2="140" stroke="#22D3EE" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Text -->
    <text x="220" y="95" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#ffffff">Synapses</text>
    <text x="220" y="160" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#0EA5E9">Med</text>

    <!-- Tagline -->
    <text x="220" y="185" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" font-weight="500">NEURAL HEALTH INTELLIGENCE</text>
  </g>

  <!-- Sidebar Title & Desc -->
  <text x="34" y="115" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Neo4j Agent</text>
  <text x="34" y="138" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">Ask questions about employee graph.</text>

  <!-- Sidebar Sample Questions Section -->
  <text x="34" y="185" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="700">Sample Questions</text>
  
  <g fill="#1e293b" stroke="#334155" stroke-width="1">
    <rect x="34" y="205" width="202" height="40" rx="8"/>
    <rect x="34" y="255" width="202" height="40" rx="8"/>
    <rect x="34" y="305" width="202" height="40" rx="8"/>
  </g>
  
  <text x="50" y="229" fill="#f8fafc" font-family="Arial, sans-serif" font-size="13">Show all employees</text>
  <text x="50" y="279" fill="#f8fafc" font-family="Arial, sans-serif" font-size="13">Highest salary?</text>
  <text x="50" y="329" fill="#f8fafc" font-family="Arial, sans-serif" font-size="13">Show relationships</text>

  <!-- Database Info -->
  <text x="34" y="390" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="700">Database Info</text>
  <text x="34" y="415" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">Database: <tspan fill="#34d399">neo4j</tspan></text>
  <text x="34" y="435" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">URI: <tspan fill="#34d399">bolt://localhost:7687</tspan></text>

  <!-- Main Page Branding Logo (SynapsesMed center top) -->
  <g transform="translate(535, 25) scale(0.5)">
    <!-- Neural Network Icon -->
    <circle cx="100" cy="100" r="55" fill="url(#gradient)" fill-opacity="0.15"/>
    <circle cx="100" cy="100" r="42" stroke="#3B82F6" stroke-width="8"/>
    
    <!-- Synapse Connections -->
    <circle cx="55" cy="65" r="12" fill="#22D3EE"/>
    <circle cx="145" cy="65" r="12" fill="#22D3EE"/>
    <circle cx="55" cy="135" r="12" fill="#22D3EE"/>
    <circle cx="145" cy="135" r="12" fill="#22D3EE"/>
    
    <!-- Connecting Lines -->
    <line x1="70" y1="70" x2="130" y2="70" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <line x1="70" y1="130" x2="130" y2="130" stroke="#3B82F6" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="60" x2="100" y2="140" stroke="#22D3EE" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Text -->
    <text x="220" y="95" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#1E3A8A">Synapses</text>
    <text x="220" y="160" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#0EA5E9">Med</text>

    <!-- Tagline -->
    <text x="220" y="185" font-family="Arial, sans-serif" font-size="18" fill="#64748B" font-weight="500">NEURAL HEALTH INTELLIGENCE</text>
  </g>

  <!-- Horizontal divider -->
  <line x1="320" y1="140" x2="1150" y2="140" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Main Page Title Header -->
  <text x="320" y="180" fill="#1e2937" font-family="Arial, sans-serif" font-size="24" font-weight="600">Neo4j Employee Agent Chatbot</text>
  <text x="320" y="205" fill="#64748b" font-family="Arial, sans-serif" font-size="14">Ask questions about employees, departments, salaries, managers, and skills.</text>

  <!-- Chat History -->
  <!-- User Message -->
  <rect x="320" y="240" width="830" height="74" rx="12" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="345" y="258" width="38" height="38" rx="8" fill="#dbeafe"/>
  <text x="353" y="285" font-size="20">👤</text>
  <text x="398" y="275" fill="#6b21a8" font-family="Arial, sans-serif" font-size="14" font-weight="700">You</text>
  <text x="398" y="297" fill="#111827" font-family="Arial, sans-serif" font-size="14">Who has the highest salary?</text>

  <!-- Agent Message -->
  <rect x="320" y="330" width="830" height="190" rx="12" fill="#f0fdf4" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="345" y="348" width="38" height="38" rx="8" fill="#dcfce7"/>
  <text x="353" y="375" font-size="20">🧠</text>
  <text x="398" y="365" fill="#15803d" font-family="Arial, sans-serif" font-size="14" font-weight="700">Neo4j Agent</text>
  <text x="398" y="387" fill="#111827" font-family="Arial, sans-serif" font-size="14">The highest paid employee is Sara Thomas with a salary of 142,000.</text>
  
  <text x="398" y="415" fill="#64748b" font-family="Arial, sans-serif" font-size="12" font-weight="600">Cypher query executed</text>
  <rect x="398" y="425" width="720" height="74" rx="8" fill="#1e2937"/>
  <text x="418" y="468" fill="#38bdf8" font-family="Consolas, monospace" font-size="13">MATCH (e:Employee) RETURN e.name, e.salary ORDER BY e.salary DESC LIMIT 1</text>

  <!-- Chat Input -->
  <rect x="320" y="620" width="830" height="52" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="344" y="652" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Ask about employees, departments, salaries..</text>
  <text x="1115" y="652" fill="#94a3b8" font-family="Arial" font-size="18" font-weight="700">▲</text>
</svg>
